name: Generate 3D Contribution Calendar

on:
  schedule:
    # Runs every day at 00:30 UTC
    - cron: "30 0 * * *"

  # Allows manual execution from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate Signal Flare 3D Contributions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate 3D contribution calendar
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: conf/github-profile-3d-contrib.json

      - name: Commit generated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add profile-3d-contrib/

          if git diff --cached --quiet; then
            echo "No contribution calendar changes."
          else
            git commit -m "Update 3D contribution calendar"
            git push
          fi