<svg width="1200" height="410" viewBox="0 0 1200 410" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">About Amish Sudhakara</title>
  <desc id="desc">Education, interests and current focus presented in a Signal Flare industrial interface.</desc>
  <defs>
    <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#929097" opacity="0.18"/>
    </pattern>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Arial, Helvetica, sans-serif; }
      .pulse { animation:pulse 1.8s ease-in-out infinite; transform-origin:center; }
      .move { stroke-dasharray:11 10; animation:dash 10s linear infinite; }
      @keyframes pulse { 0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:1;transform:scale(1.12)} }
      @keyframes dash { to{stroke-dashoffset:-220} }
    </style>
  </defs>

  <rect width="1200" height="410" fill="#0D0D0F"/>
  <rect x="18" y="18" width="1164" height="374" fill="#19191D" stroke="#34343A" stroke-width="2"/>
  <rect x="18" y="18" width="1164" height="374" fill="url(#dots)"/>

  <rect x="18" y="18" width="17" height="374" fill="#FF4F00"/>
  <rect x="1165" y="18" width="17" height="374" fill="#D8FF3E"/>

  <text x="62" y="65" class="mono" fill="#FF4F00" font-size="17" font-weight="800" letter-spacing="3">ABOUT / 02</text>
  <line x1="190" y1="59" x2="1138" y2="59" stroke="#34343A" stroke-width="2" class="move"/>

  <!-- left identity rail -->
  <g transform="translate(62 93)">
    <rect width="295" height="296" fill="#0D0D0F" stroke="#34343A" stroke-width="2"/>
    <rect width="295" height="47" fill="#FF4F00"/>
    <text x="20" y="30" class="mono" fill="#0D0D0F" font-size="14" font-weight="900" letter-spacing="2">IDENTITY CARD</text>

    <text x="20" y="82" class="mono" fill="#929097" font-size="11" letter-spacing="1.8">NAME</text>
    <text x="20" y="105" class="mono" fill="#F2EBDD" font-size="17" font-weight="700">AMISH SUDHAKARA</text>

    <line x1="20" y1="122" x2="275" y2="122" stroke="#34343A"/>
    <text x="20" y="148" class="mono" fill="#929097" font-size="11" letter-spacing="1.8">DEGREE</text>
    <text x="20" y="171" class="mono" fill="#F2EBDD" font-size="14">B.TECH — INFORMATION</text>
    <text x="20" y="192" class="mono" fill="#F2EBDD" font-size="14">SCIENCE &amp; ENGINEERING</text>

    <line x1="20" y1="210" x2="275" y2="210" stroke="#34343A"/>
    <text x="20" y="236" class="mono" fill="#929097" font-size="11" letter-spacing="1.8">INSTITUTE</text>
    <text x="20" y="259" class="mono" fill="#F2EBDD" font-size="13">NMAM INSTITUTE OF</text>
    <text x="20" y="279" class="mono" fill="#F2EBDD" font-size="13">TECHNOLOGY, NITTE</text>

    <circle cx="262" cy="270" r="7" fill="#D8FF3E" class="pulse"/>
  </g>

  <!-- main copy -->
  <g transform="translate(393 94)">
    <text x="0" y="23" class="mono" fill="#D8FF3E" font-size="12" letter-spacing="2">HELLO / SYSTEM INTRODUCTION</text>
    <text x="0" y="68" class="sans" fill="#F2EBDD" font-size="24" font-weight="700">I’m a student interested in artificial intelligence,</text>
    <text x="0" y="101" class="sans" fill="#F2EBDD" font-size="24" font-weight="700">programming, and software development.</text>

    <text x="0" y="146" class="sans" fill="#929097" font-size="17">I learn mainly by building, testing, fixing mistakes, and understanding</text>
    <text x="0" y="173" class="sans" fill="#929097" font-size="17">how the pieces of a system work together. I’m currently strengthening</text>
    <text x="0" y="200" class="sans" fill="#929097" font-size="17">my fundamentals while exploring practical AI and software workflows.</text>

    <!-- calm focus chips -->
    <g transform="translate(0 231)">
      <rect width="188" height="43" fill="#0D0D0F" stroke="#FF4F00" stroke-width="2"/>
      <text x="94" y="27" text-anchor="middle" class="mono" fill="#F2EBDD" font-size="12" letter-spacing="1.3">PROGRAMMING</text>

      <rect x="202" width="102" height="43" fill="#FF4F00"/>
      <text x="253" y="27" text-anchor="middle" class="mono" fill="#0D0D0F" font-size="12" font-weight="900" letter-spacing="1.5">AI</text>

      <rect x="318" width="228" height="43" fill="#0D0D0F" stroke="#34343A" stroke-width="2"/>
      <text x="432" y="27" text-anchor="middle" class="mono" fill="#F2EBDD" font-size="12" letter-spacing="1.1">SOFTWARE DEVELOPMENT</text>

      <rect x="560" width="145" height="43" fill="#D8FF3E"/>
      <text x="632.5" y="27" text-anchor="middle" class="mono" fill="#0D0D0F" font-size="12" font-weight="900" letter-spacing="1.2">LEARNING</text>
    </g>
  </g>
</svg>
