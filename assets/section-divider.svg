<svg width="1200" height="78" viewBox="0 0 1200 78" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated Signal Flare section divider">
  <defs>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FF4F00" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FF4F00"/>
      <stop offset="0.56" stop-color="#D8FF3E"/>
      <stop offset="1" stop-color="#FF4F00" stop-opacity="0"/>
    </linearGradient>
    <style>
      .beam { animation:beam 4.8s linear infinite; }
      .dash { stroke-dasharray:13 10; animation:dash 7s linear infinite; }
      .pulse { animation:pulse 1.5s ease-in-out infinite; transform-origin:center; }
      @keyframes beam { from{transform:translateX(-700px)} to{transform:translateX(1500px)} }
      @keyframes dash { to{stroke-dashoffset:-230} }
      @keyframes pulse {0%,100%{opacity:.35;transform:scale(.75)}50%{opacity:1;transform:scale(1.2)}}
    </style>
  </defs>
  <rect width="1200" height="78" fill="#0D0D0F"/>
  <line x1="30" y1="39" x2="1170" y2="39" stroke="#34343A" stroke-width="2" class="dash"/>
  <rect x="-700" y="35" width="560" height="8" fill="url(#beam)" class="beam"/>
  <rect x="30" y="27" width="10" height="24" fill="#FF4F00"/>
  <rect x="1160" y="27" width="10" height="24" fill="#D8FF3E"/>
  <circle cx="600" cy="39" r="6" fill="#D8FF3E" class="pulse"/>
  <rect x="548" y="27" width="34" height="24" fill="#19191D" stroke="#34343A"/>
  <rect x="618" y="27" width="34" height="24" fill="#19191D" stroke="#34343A"/>
</svg>
