<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Technologies Amish works with</title>
  <desc id="desc">Programming languages, AI tools, development technologies, platforms, and current learning areas.</desc>
  <defs>
    <pattern id="diagonal" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#34343A" stroke-width="3" opacity="0.35"/>
    </pattern>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Arial, Helvetica, sans-serif; }
      .dash { stroke-dasharray:14 11; animation:dash 9s linear infinite; }
      .blink { animation:blink 1.3s steps(2,end) infinite; }
      .chipA { animation:chipA 4.7s ease-in-out infinite; }
      .chipB { animation:chipB 5.4s ease-in-out infinite; }
      .chipC { animation:chipC 4.1s ease-in-out infinite; }
      @keyframes dash { to{stroke-dashoffset:-260} }
      @keyframes blink {0%,48%{opacity:1}49%,100%{opacity:.2}}
      @keyframes chipA {0%,100%{opacity:.65}50%{opacity:1}}
      @keyframes chipB {0%,100%{opacity:1}50%{opacity:.58}}
      @keyframes chipC {0%,100%{opacity:.75}50%{opacity:1}}
    </style>
  </defs>

  <rect width="1200" height="720" fill="#0D0D0F"/>
  <rect x="18" y="18" width="1164" height="684" fill="#19191D" stroke="#34343A" stroke-width="2"/>
