<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="265" viewBox="0 0 1200 265">
<defs>
<linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0" stop-color="#FF5FB2"/><stop offset=".27" stop-color="#8A4DFF"/>
  <stop offset=".56" stop-color="#74DFFF"/><stop offset=".82" stop-color="#D9FF8A"/>
  <stop offset="1" stop-color="#BD7857"/>
  <animate attributeName="x1" values="0;.35;0" dur="9s" repeatCount="indefinite"/>
  <animate attributeName="x2" values="1;.65;1" dur="9s" repeatCount="indefinite"/>
</linearGradient>
<linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0" stop-color="#FFFFFF" stop-opacity=".16"/>
  <stop offset=".28" stop-color="#FFFFFF" stop-opacity=".055"/>
  <stop offset=".7" stop-color="#8A4DFF" stop-opacity=".055"/>
  <stop offset="1" stop-color="#74DFFF" stop-opacity=".02"/>
</linearGradient>
<linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
  <stop offset=".47" stop-color="#FFFFFF" stop-opacity="0"/>
  <stop offset=".5" stop-color="#FFFFFF" stop-opacity=".42"/>
  <stop offset=".53" stop-color="#FFFFFF" stop-opacity="0"/>
  <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
</linearGradient>
<radialGradient id="violetBlob"><stop stop-color="#8A4DFF" stop-opacity=".46"/><stop offset="1" stop-color="#8A4DFF" stop-opacity="0"/></radialGradient>
<radialGradient id="cyanBlob"><stop stop-color="#74DFFF" stop-opacity=".38"/><stop offset="1" stop-color="#74DFFF" stop-opacity="0"/></radialGradient>
<radialGradient id="pinkBlob"><stop stop-color="#FF5FB2" stop-opacity=".32"/><stop offset="1" stop-color="#FF5FB2" stop-opacity="0"/></radialGradient>
<filter id="blur32" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="32"/></filter>
<filter id="blur18" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="18"/></filter>
<filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="glassNoise" x="-20%" y="-20%" width="140%" height="140%">
  <feTurbulence baseFrequency=".85" numOctaves="2" seed="14" type="fractalNoise" result="n"/>
  <feColorMatrix in="n" type="saturate" values="0" result="mono"/>
  <feComponentTransfer in="mono"><feFuncA type="table" tableValues="0 .035"/></feComponentTransfer>
</filter>
<pattern id="microgrid" width="30" height="30" patternUnits="userSpaceOnUse">
  <path d="M30 0H0V30" fill="none" stroke="#FFFFFF" stroke-opacity=".022"/>
</pattern>

<style>.m{font:800 23px Arial,sans-serif;letter-spacing:4px;fill:#EAF5FF}.s{font:500 13px Arial,sans-serif;letter-spacing:2px;fill:#9AA4B7}</style>
<clipPath id="c"><rect x="1" y="1" width="1198" height="263" rx="30"/></clipPath>
</defs>
<rect width="1200" height="265" rx="30" fill="#06080D"/>
<g clip-path="url(#c)">
 <ellipse cx="600" cy="130" rx="330" ry="145" fill="url(#violetBlob)" filter="url(#blur32)" opacity=".35"><animate attributeName="rx" values="280;390;280" dur="8s" repeatCount="indefinite"/></ellipse>
 <ellipse cx="780" cy="90" rx="230" ry="100" fill="url(#cyanBlob)" filter="url(#blur32)" opacity=".25"><animate attributeName="cx" values="720;870;720" dur="10s" repeatCount="indefinite"/></ellipse>
 <rect x="22" y="22" width="1156" height="221" rx="26" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity=".13"/>
 <rect x="22" y="22" width="1156" height="221" rx="26" fill="none" stroke="url(#edge)" stroke-opacity=".65" stroke-width="1.6" stroke-dasharray="210 930"><animate attributeName="stroke-dashoffset" values="0;-1140" dur="10s" repeatCount="indefinite"/></rect>
 <rect x="-380" y="22" width="320" height="221" fill="url(#shine)" opacity=".18" transform="skewX(-16)"><animate attributeName="x" values="-390;1510" dur="9s" repeatCount="indefinite"/></rect>
</g>
<rect x="1" y="1" width="1198" height="263" rx="29" fill="none" stroke="#2D3444"/>
<path d="M74 128H514" stroke="url(#edge)" stroke-width="2" stroke-dasharray="70 34"><animate attributeName="stroke-dashoffset" values="0;-208" dur="4s" repeatCount="indefinite"/></path>
<path d="M686 128H1126" stroke="url(#edge)" stroke-width="2" stroke-dasharray="70 34"><animate attributeName="stroke-dashoffset" values="0;208" dur="4s" repeatCount="indefinite"/></path>
<g transform="translate(600 128)">
 <circle r="54" fill="#060910" fill-opacity=".55" stroke="#FFFFFF" stroke-opacity=".15"/>
 <circle r="42" fill="none" stroke="url(#edge)" stroke-width="2.2" stroke-dasharray="42 18"><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="11s" repeatCount="indefinite"/></circle>
 <circle r="28" fill="none" stroke="url(#edge)" stroke-width="1.5" stroke-dasharray="18 12"><animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="7s" repeatCount="indefinite"/></circle>
 <circle r="16" fill="url(#cyanBlob)" filter="url(#glow)"><animate attributeName="r" values="13;18;13" dur="3s" repeatCount="indefinite"/></circle>
 <circle r="5" fill="#EAF5FF"/>
</g>
<text x="600" y="216" text-anchor="middle" class="m">LEARNING · BUILDING · IMPROVING</text>
<text x="600" y="241" text-anchor="middle" class="s">AMISH SUDHAKARA · GITHUB PROFILE</text>
</svg>
