<svg width="1200" height="250" viewBox="0 0 1200 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Profile footer</title>
  <desc id="desc">A Signal Flare themed footer saying continuously learning, building and improving.</desc>
  <defs>
    <pattern id="lines" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M0 16L16 0" stroke="#34343A" stroke-width="2" opacity="0.3"/>
    </pattern>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .display { font-family: "Arial Black", Impact, Arial, sans-serif; font-weight:900; }
      .dash { stroke-dasharray:16 12; animation:dash 8s linear infinite; }
      .pulse { animation:pulse 1.7s ease-in-out infinite; transform-origin:center; }
      .blink { animation:blink 1.1s steps(2,end) infinite; }
      @keyframes dash { to{stroke-dashoffset:-270} }
      @keyframes pulse {0%,100%{opacity:.4;transform:scale(.82)}50%{opacity:1;transform:scale(1.12)}}
      @keyframes blink {0%,48%{opacity:1}49%,100%{opacity:.18}}
    </style>
  </defs>

  <rect width="1200" height="250" fill="#0D0D0F"/>
  <rect x="18" y="18" width="1164" height="214" fill="#19191D" stroke="#34343A" stroke-width="2"/>
  <rect x="18" y="18" width="1164" height="214" fill="url(#lines)"/>

  <rect x="18" y="18" width="198" height="214" fill="#FF4F00"/>
  <text x="46" y="66" class="mono" fill="#0D0D0F" font-size="13" font-weight="900" letter-spacing="2">END OF PAGE</text>
  <text x="46" y="94" class="mono" fill="#0D0D0F" font-size="11" font-weight="900" letter-spacing="1.5">PROFILE / 06</text>
  <circle cx="63" cy="179" r="9" fill="#D8FF3E" class="pulse"/>
  <text x="84" y="184" class="mono" fill="#0D0D0F" font-size="11" font-weight="900" letter-spacing="1.2">ACTIVE</text>

  <text x="254" y="85" class="display" fill="#F2EBDD" font-size="48" letter-spacing="1">CONTINUOUSLY</text>
  <text x="254" y="143" class="display" fill="#F2EBDD" font-size="48" letter-spacing="1">LEARNING.</text>
  <rect x="655" y="105" width="158" height="16" fill="#FF4F00"/>
  <rect x="818" y="105" width="86" height="16" fill="#D8FF3E"/>

  <line x1="254" y1="169" x2="1128" y2="169" stroke="#34343A" stroke-width="2" class="dash"/>
  <text x="254" y="201" class="mono" fill="#929097" font-size="12" letter-spacing="2">BUILDING · TESTING · FIXING · IMPROVING</text>
  <text x="1076" y="201" class="mono blink" fill="#D8FF3E" font-size="20">▮</text>
</svg>
